<style>/* ═══════════════════════════════════════════════════
TDBEER — Production CSS
تنظيم: tokens → reset → layout → components → utilities
═══════════════════════════════════════════════════ */

/* ── DESIGN TOKENS ── */
:root {
/* Colors - Dark (default) */
--bg: #0a0a0a;
--bg2: #141414;
--bg3: #1c1c1c;
--bg4: #252525;
--bg5: #2d2d2d;

--accent: #c9a84c;
--accent-2: #f0d98a;
--accent-dim: rgba(201,168,76,.12);
--accent-glow: rgba(201,168,76,.22);
--accent-bd: rgba(201,168,76,.28);

--green: #10b981;
--green-2: #34d399;
--green-dim: rgba(16,185,129,.12);

--danger: #ef4444;
--warn: #f97316;

--text: #f0f0f0;
--text2: #a0a0a0;
--text3: #606060;

--border: rgba(255,255,255,.08);
--border2: rgba(255,255,255,.14);

/* Spacing scale (4px base) */
--s-1: 4px; --s-2: 8px; --s-3: 12px;
--s-4: 16px; --s-5: 20px; --s-6: 24px;
--s-8: 32px; --s-10: 40px;

/* Radii */
--r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px;

/* Typography */
--font: 'IBM Plex Sans Arabic', -apple-system, system-ui, sans-serif;
--fs-xs: 11px; --fs-sm: 13px; --fs-md: 15px;
--fs-lg: 18px; --fs-xl: 24px; --fs-2xl: 32px;

/* Motion */
--ease: cubic-bezier(.4,0,.2,1);
--t-fast: .15s; --t-med: .25s; --t-slow: .4s;

/* Shadows */
--shadow-1: 0 2px 8px rgba(0,0,0,.2);
--shadow-2: 0 8px 24px rgba(0,0,0,.4);
--shadow-3: 0 16px 48px rgba(0,0,0,.6);

/* Layout */
--container: 540px;
--nav-h: 54px;
--band-h: 24px;
--tabs-h: 46px;
}
/* Light theme */
[data-theme="light"] {
--bg: #fdf8f3;
--bg2: #ffffff;
--bg3: #f7f0e8;
--bg4: #efe5d9;
--bg5: #e5dcd0;
--text: #2d2d2a;
--text2: #6b6b60;
--text3: #a8a895;
--border: rgba(188,170,151,.18);
--border2: rgba(188,170,151,.28);
--shadow-2: 0 4px 20px rgba(188,170,151,.15);
}
/* Midnight theme */
[data-theme="midnight"] {
--bg: #05070a;
--bg2: #0c0f16;
--bg3: #121620;
--bg4: #1a1f2c;
--bg5: #232a3a;
--accent: #01dd8c;
--accent-2: #5dffc3;
--accent-dim: rgba(1,221,140,.12);
--accent-glow: rgba(1,221,140,.28);
--accent-bd: rgba(1,221,140,.32);
--text: #e8e8f0;
--text2: #8888a0;
--text3: #383850;
}
/* Rose theme (للبنات) */
[data-theme="rose"] {
--bg: #1a0d14;
--bg2: #261520;
--bg3: #321a2a;
--bg4: #3f2034;
--bg5: #4a273f;
--accent: #ff6fa5;
--accent-2: #ffa8c5;
--accent-dim: rgba(255,111,165,.14);
--accent-glow: rgba(255,111,165,.35);
--accent-bd: rgba(255,111,165,.38);
--text: #fce8f2;
--text2: #c09cb0;
--text3: #846b7b;
--green-2: #ffb3c7;
--green-dim: rgba(255,168,197,.15);
--border: rgba(255,111,165,.15);
--border2: rgba(255,111,165,.28);
--shadow-2: 0 4px 20px rgba(255,111,165,.2);
}
/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after {
animation-duration: .01ms !important;
animation-iteration-count: 1 !important;
transition-duration: .01ms !important;
}
}
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
font-family: var(--font);
background: var(--bg);
color: var(--text);
min-height: 100vh;
min-height: 100dvh;
line-height: 1.6;
direction: rtl;
overflow-x: hidden;
padding-bottom: calc(80px + env(safe-area-inset-bottom));
-webkit-tap-highlight-color: transparent;
transition: background var(--t-med), color var(--t-med);
}
button, input, select, textarea { font-family: inherit; font-size: inherit; }
button { cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { outline: none; }
svg { display: block; }
/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
/* Ambient background */
body::before {
content: '';
position: fixed;
inset: 0;
z-index: 0;
pointer-events: none;
background:
radial-gradient(ellipse 60% 40% at 50% 0%, var(--accent-dim) 0%, transparent 55%),
radial-gradient(ellipse 40% 30% at 90% 85%, var(--accent-dim) 0%, transparent 50%);
opacity: .6;
}
/* ── UTILITIES ── */
.visually-hidden {
position: absolute !important;
width: 1px; height: 1px;
padding: 0; margin: -1px;
overflow: hidden;
clip: rect(0,0,0,0);
white-space: nowrap;
border: 0;
}
.flex { display: flex; }
.flex-col { display: flex; flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: var(--s-2); }
.gap-3 { gap: var(--s-3); }
/* ── LANDING (HERO) ── */
.landing {
min-height: 100vh;
min-height: 100dvh;
padding: 60px 5% 40px;
text-align: center;
position: relative;
z-index: 1;
overflow: hidden;
}
/* Animated golden particles background */
.landing::before {
content: '';
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
background:
radial-gradient(circle at 20% 20%, var(--accent-glow) 0%, transparent 45%),
radial-gradient(circle at 80% 60%, var(--accent-dim) 0%, transparent 50%),
radial-gradient(circle at 50% 90%, var(--accent-glow) 0%, transparent 40%);
opacity: .4;
pointer-events: none;
z-index: -1;
animation: bgShift 15s ease-in-out infinite alternate;
}
@keyframes bgShift {
0% { transform: scale(1) translate(0, 0); opacity: .35; }
50% { transform: scale(1.15) translate(20px, -15px); opacity: .55; }
100% { transform: scale(1) translate(-10px, 20px); opacity: .4; }
}
/* Floating orbs */
.landing::after {
content: '';
position: absolute;
top: 15%;
left: -100px;
width: 300px;
height: 300px;
border-radius: 50%;
background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
filter: blur(40px);
animation: orbFloat 20s ease-in-out infinite;
pointer-events: none;
z-index: -1;
}
@keyframes orbFloat {
0%, 100% { transform: translate(0, 0) scale(1); }
25% { transform: translate(calc(100vw - 200px), 100px) scale(1.2); }
50% { transform: translate(calc(50vw), 300px) scale(.8); }
75% { transform: translate(-50px, 200px) scale(1.1); }
}
/* Logo with animated glow */
.landing-logo {
width: 92px; height: 92px;
margin: 0 auto var(--s-5);
background: linear-gradient(135deg, var(--accent), var(--accent-2));
border-radius: 24px;
display: flex; align-items: center; justify-content: center;
position: relative;
animation: logoFloat 4s ease-in-out infinite, logoAppear .8s var(--ease);
box-shadow:
0 12px 40px var(--accent-glow),
0 0 0 1px rgba(255,255,255,.08) inset;
}
.landing-logo::before {
content: '';
position: absolute;
inset: -6px;
border-radius: 28px;
background: linear-gradient(135deg, var(--accent), var(--accent-2));
opacity: .3;
filter: blur(12px);
z-index: -1;
animation: logoGlow 2.5s ease-in-out infinite alternate;
}
.landing-logo::after {
content: '';
position: absolute;
inset: 0;
border-radius: 24px;
background: linear-gradient(135deg, transparent, rgba(255,255,255,.15), transparent);
opacity: 0;
animation: logoShine 3s ease-in-out infinite;
pointer-events: none;
}
@keyframes logoFloat {
0%, 100% { transform: translateY(0) rotate(0deg); }
50% { transform: translateY(-8px) rotate(-2deg); }
}
@keyframes logoGlow {
0% { opacity: .3; transform: scale(1); }
100% { opacity: .6; transform: scale(1.12); }
}
@keyframes logoShine {
0%, 100% { opacity: 0; transform: translateX(-100%); }
50% { opacity: 1; transform: translateX(100%); }
}
@keyframes logoAppear {
from { transform: scale(0) rotate(-180deg); opacity: 0; }
to { transform: scale(1) rotate(0deg); opacity: 1; }
}
.landing-logo svg {
width: 64px; height: auto; fill: #0a0600;
animation: logoIconPulse 3s ease-in-out infinite;
}
@keyframes logoIconPulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.08); }
}
.landing h1 {
font-size: clamp(38px, 9vw, 72px);
font-weight: 900;
letter-spacing: -2.5px;
line-height: 1.05;
margin-bottom: var(--s-3);
color: var(--text);
animation: fadeSlideUp .8s .2s both var(--ease);
}
.landing h1 .accent {
background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent));
background-size: 200% auto;
-webkit-background-clip: text;
background-clip: text;
color: transparent;
animation: gradientShift 4s ease-in-out infinite;
}
@keyframes gradientShift {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}
@keyframes fadeSlideUp {
from { transform: translateY(30px); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}
.landing-sub {
font-size: clamp(15px, 3vw, 18px);
color: var(--text2);
max-width: 500px;
margin: 0 auto var(--s-6);
line-height: 1.75;
animation: fadeSlideUp .8s .4s both var(--ease);
}
/* Eyebrow / pre-title */
.landing-eyebrow {
display: inline-flex;
align-items: center;
gap: 8px;
padding: 6px 14px;
background: var(--accent-dim);
border: 1px solid var(--accent-bd);
border-radius: 20px;
font-size: 12px;
font-weight: 700;
color: var(--accent-2);
margin-bottom: var(--s-4);
animation: fadeSlideUp .8s .1s both var(--ease);
}
.landing-eyebrow-dot {
width: 6px;
height: 6px;
border-radius: 50%;
background: var(--accent);
animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse {
0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 var(--accent); }
50% { opacity: .7; transform: scale(1.2); box-shadow: 0 0 0 6px transparent; }
}
.landing-cta {
display: inline-flex;
align-items: center;
gap: var(--s-2);
background: linear-gradient(135deg, var(--accent), var(--accent-2));
color: #0a0600;
border-radius: 16px;
padding: 18px 44px;
font-size: 17px;
font-weight: 800;
text-decoration: none;
box-shadow: 0 10px 32px var(--accent-glow);
transition: transform var(--t-fast), box-shadow var(--t-fast);
position: relative;
overflow: hidden;
animation: fadeSlideUp .8s .6s both var(--ease), ctaPulse 2.5s ease-in-out infinite 1.5s;
}
.landing-cta::before {
content: '';
position: absolute;
top: 0; left: -100%;
width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
transition: left .5s;
}
.landing-cta:hover::before { left: 100%; }
.landing-cta:active { transform: scale(.97); }
.landing-cta:hover {
box-shadow: 0 16px 44px var(--accent-glow);
transform: translateY(-3px);
}
@keyframes ctaPulse {
0%, 100% { box-shadow: 0 10px 32px var(--accent-glow); }
50% { box-shadow: 0 14px 44px var(--accent-glow), 0 0 0 8px transparent; }
}
/* Secondary CTA hint */
.landing-cta-hint {
display: block;
margin-top: var(--s-3);
font-size: 11px;
color: var(--text3);
animation: fadeSlideUp .8s .7s both var(--ease);
}
.landing-cta-hint b { color: var(--accent-2); }
/* Features grid */
.landing-features {
max-width: 900px;
margin: 80px auto 0;
display: grid;
grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
gap: var(--s-3);
animation: fadeSlideUp .8s .8s both var(--ease);
}
.landing-feature {
background: linear-gradient(145deg, var(--bg3), var(--bg2));
border: 1px solid var(--border);
border-radius: var(--r-lg);
padding: var(--s-5);
text-align: right;
transition: all var(--t-med);
position: relative;
overflow: hidden;
}
.landing-feature::before {
content: '';
position: absolute;
top: 0; right: 0;
width: 80px; height: 80px;
background: radial-gradient(circle, var(--accent-glow), transparent 70%);
opacity: 0;
transition: opacity var(--t-med);
}
.landing-feature:hover {
border-color: var(--accent-bd);
transform: translateY(-4px);
box-shadow: 0 12px 32px rgba(0,0,0,.4);
}
.landing-feature:hover::before { opacity: .3; }
.landing-feature-icon {
width: 48px; height: 48px;
background: var(--accent-dim);
border: 1px solid var(--accent-bd);
border-radius: 14px;
display: flex; align-items: center; justify-content: center;
font-size: 24px;
margin-bottom: var(--s-3);
transition: transform var(--t-med);
}
.landing-feature:hover .landing-feature-icon {
transform: scale(1.1) rotate(-5deg);
}
.landing-feature h3 {
font-size: 16px;
font-weight: 800;
color: var(--text);
margin-bottom: var(--s-2);
}
.landing-feature p {
font-size: 13px;
color: var(--text2);
line-height: 1.65;
}
.landing-stats {
display: flex;
justify-content: center;
gap: var(--s-8);
margin-top: var(--s-8);
flex-wrap: wrap;
}
.landing-stat-num { font-size: 28px; font-weight: 800; color: var(--text); display: block; }
.landing-stat-lbl { font-size: 12px; color: var(--text2); }
/* ── APP MODAL ── */
.app-modal {
display: none;
position: fixed;
inset: 0;
z-index: 9999;
background: var(--bg);
}
.app-modal.open {
display: flex;
animation: fadeIn var(--t-med) var(--ease);
}
@keyframes fadeIn {
from { opacity: 0; }
to { opacity: 1; }
}
.app-shell {
width: 100%;
max-width: var(--container);
margin: 0 auto;
display: flex;
flex-direction: column;
height: 100%;
position: relative;
overflow: hidden;
background: var(--bg2);
border-right: 1px solid var(--border);
border-left: 1px solid var(--border);
}
.app-close {
position: absolute;
top: calc(var(--s-2) + env(safe-area-inset-top));
left: var(--s-3);
z-index: 10001;
width: 32px; height: 32px;
border-radius: 50%;
border: 1px solid var(--border2);
background: var(--bg3);
color: var(--text2);
font-size: 14px;
display: flex; align-items: center; justify-content: center;
transition: all var(--t-fast);
}
.app-close:hover {
background: rgba(239,68,68,.2);
color: var(--danger);
border-color: var(--danger);
}
.app-scroll {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
overscroll-behavior: contain;
}
/* ── HEADER ── */
.app-header {
background: linear-gradient(180deg, var(--bg2), var(--bg));
border-bottom: 1px solid var(--border);
position: sticky;
top: 0;
z-index: 200;
padding-top: env(safe-area-inset-top);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
animation: headerSlideDown .6s var(--ease);
}
@keyframes headerSlideDown {
from { transform: translateY(-100%); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}
.app-header::after {
content: '';
position: absolute;
bottom: -1px;
left: 0;
right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, var(--accent-bd), transparent);
opacity: .6;
}
.header-band {
background: linear-gradient(90deg, var(--accent-dim), transparent, var(--accent-dim));
border-bottom: 1px solid var(--accent-bd);
padding: 6px var(--s-4);
display: flex;
align-items: center;
justify-content: center;
gap: var(--s-2);
font-size: 11px;
flex-wrap: wrap;
position: relative;
overflow: hidden;
}
.header-band::before {
content: '';
position: absolute;
top: 0;
left: -100%;
width: 100%;
height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent);
animation: headerBandShine 6s ease-in-out infinite;
}
@keyframes headerBandShine {
to { left: 100%; }
}
.header-band-chip {
background: linear-gradient(135deg, var(--accent), var(--accent-2));
color: #0a0600;
font-size: 9px;
font-weight: 800;
padding: 2px 8px;
border-radius: 20px;
letter-spacing: .5px;
box-shadow: 0 2px 8px var(--accent-glow);
}
.header-band-text { color: var(--accent-2); font-weight: 700; }
.header-inner {
max-width: var(--container);
margin: 0 auto;
display: flex;
align-items: center;
gap: var(--s-2);
height: var(--nav-h);
padding: 0 var(--s-4);
}
.app-logo {
display: flex;
align-items: center;
gap: var(--s-2);
cursor: pointer;
transition: transform var(--t-med);
}
.app-logo:hover { transform: scale(1.03); }
.app-logo-mark {
width: 38px; height: 38px;
border-radius: 12px;
background: linear-gradient(135deg, var(--accent), var(--accent-2));
display: flex; align-items: center; justify-content: center;
box-shadow: 0 0 20px var(--accent-glow);
position: relative;
animation: logoBreathe 3s ease-in-out infinite;
transition: transform var(--t-med);
}
.app-logo:hover .app-logo-mark {
transform: rotate(-5deg) scale(1.05);
}
@keyframes logoBreathe {
0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
50% { box-shadow: 0 0 28px var(--accent-glow), 0 0 40px var(--accent-dim); }
}
.app-logo-mark::after {
content: '';
position: absolute;
inset: -2px;
border-radius: 14px;
background: linear-gradient(135deg, var(--accent), var(--accent-2));
opacity: 0;
filter: blur(8px);
z-index: -1;
transition: opacity var(--t-med);
}
.app-logo:hover .app-logo-mark::after { opacity: .6; }
.app-logo-mark svg {
width: 26px; height: auto; fill: #0a0600;
animation: logoIconBob 3s ease-in-out infinite;
}
@keyframes logoIconBob {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-1px); }
}
.app-logo-name {
font-size: 19px;
font-weight: 900;
color: var(--text);
letter-spacing: -.5px;
background: linear-gradient(135deg, var(--text), var(--accent-2));
-webkit-background-clip: text;
background-clip: text;
}
.app-logo-pro {
font-size: 8px; font-weight: 800;
background: var(--accent); color: #0a0600;
padding: 2px 6px; border-radius: 4px;
margin-top: -10px;
}
.header-spacer { flex: 1; }
.icon-btn {
width: 40px; height: 40px;
border-radius: 12px;
border: 1px solid var(--border);
background: linear-gradient(135deg, var(--bg3), var(--bg4));
color: var(--text2);
font-size: 17px;
display: flex; align-items: center; justify-content: center;
position: relative;
transition: all var(--t-med);
cursor: pointer;
overflow: hidden;
}
.icon-btn::before {
content: '';
position: absolute;
inset: 0;
background: radial-gradient(circle, var(--accent-glow), transparent 70%);
opacity: 0;
transition: opacity var(--t-med);
}
.icon-btn:hover, .icon-btn:focus-visible {
border-color: var(--accent);
color: var(--accent-2);
transform: translateY(-2px);
box-shadow: 0 6px 16px rgba(0,0,0,.3);
}
.icon-btn:hover::before { opacity: .4; }
.icon-btn:active { transform: translateY(0) scale(.95); }
.icon-btn.alert {
border-color: var(--accent);
color: var(--accent-2);
animation: alertPulse 2s ease-in-out infinite;
}
@keyframes alertPulse {
0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
50% { box-shadow: 0 0 0 6px transparent; }
}
.icon-dot {
position: absolute;
top: -2px; right: -2px;
width: 9px; height: 9px;
border-radius: 50%;
background: var(--danger);
display: none;
border: 2px solid var(--bg2);
}
.icon-dot.show {
display: block;
animation: pulse 2s infinite;
}
@keyframes pulse {
0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
}
/* ── TABS NAV ── */
.main-nav {
background: var(--bg2);
border-bottom: 1px solid var(--border);
position: sticky;
top: calc(var(--nav-h) + var(--band-h) + env(safe-area-inset-top));
z-index: 199;
padding: 0 var(--s-2);
}
.main-nav-inner {
max-width: var(--container);
margin: 0 auto;
display: flex;
gap: var(--s-1);
padding-top: var(--s-2);
}
.tab-btn {
flex: 1;
padding: 10px 4px 9px;
border-bottom: 2.5px solid transparent;
border-radius: 10px 10px 0 0;
color: var(--text3);
display: flex;
flex-direction: column;
align-items: center;
gap: 3px;
transition: all var(--t-fast);
min-width: 0;
font-size: var(--fs-xs);
font-weight: 700;
}
.tab-btn:hover { color: var(--text2); background: rgba(255,255,255,.04); }
.tab-btn.active {
color: var(--accent-2);
border-bottom-color: var(--accent);
background: var(--accent-dim);
}
.tab-icon { font-size: 18px; line-height: 1; }
.tab-label { font-size: 9px; white-space: nowrap; }
/* Month bar */
.month-bar {
background: var(--bg3);
border-bottom: 1px solid var(--border);
padding: var(--s-2) var(--s-4);
display: flex;
align-items: center;
justify-content: center;
gap: var(--s-3);
}
.month-arrow {
width: 30px; height: 30px;
border-radius: 8px;
border: 1px solid var(--border2);
background: var(--bg4);
color: var(--text2);
font-size: 18px;
display: flex; align-items: center; justify-content: center;
transition: all var(--t-fast);
}
.month-arrow:hover { border-color: var(--accent); color: var(--accent); }
.month-arrow:active { transform: scale(.92); }
.month-label {
font-size: 14px;
font-weight: 700;
min-width: 140px;
text-align: center;
}
/* ── MAIN ── */
.main {
max-width: var(--container);
margin: 0 auto;
padding: var(--s-3) var(--s-3) 0;
}
/* ── CARDS ── */
.card {
background: linear-gradient(145deg, var(--bg3), var(--bg2));
border: 1px solid var(--border);
border-radius: var(--r-md);
padding: var(--s-4);
margin-bottom: var(--s-3);
position: relative;
overflow: hidden;
transition: all var(--t-med);
animation: cardAppear .6s var(--ease) both;
}
.card::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
height:1px;
background:linear-gradient(90deg, transparent, var(--accent-bd), transparent);
opacity:.6;
}
.card:hover{
border-color: var(--accent-bd);
transform: translateY(-2px);
box-shadow: 0 10px 30px rgba(0,0,0,.3), 0 0 20px var(--accent-glow);
}
@keyframes cardAppear {
from { transform: translateY(15px); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}
/* Stagger cards in a list */
.card:nth-of-type(1) { animation-delay: .05s; }
.card:nth-of-type(2) { animation-delay: .1s; }
.card:nth-of-type(3) { animation-delay: .15s; }
.card:nth-of-type(4) { animation-delay: .2s; }
.card:nth-of-type(5) { animation-delay: .25s; }
.card:nth-of-type(6) { animation-delay: .3s; }
.card-head {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: var(--s-3);
position: relative;
z-index: 2;
}
.card-title {
font-size: var(--fs-sm);
font-weight: 800;
color: var(--text);
display: inline-flex;
align-items: center;
gap: 8px;
letter-spacing: -.2px;
}
.card-sub {
font-size: 11px;
color: var(--text3);
margin-top: 3px;
line-height: 1.5;
}
/* Greeting */
.greeting-card {
padding: var(--s-4) var(--s-4) var(--s-2);
margin-bottom: var(--s-3);
position: relative;
animation: greetingIn .7s var(--ease);
}
@keyframes greetingIn {
from { transform: translateX(-20px); opacity: 0; }
to { transform: translateX(0); opacity: 1; }
}
.greeting-hello {
font-size: 24px;
font-weight: 900;
background: linear-gradient(135deg, var(--text), var(--accent-2));
-webkit-background-clip: text;
background-clip: text;
color: transparent;
letter-spacing: -.5px;
line-height: 1.2;
display: inline-block;
}
.greeting-sub {
font-size: 13px;
color: var(--text3);
margin-top: 6px;
animation: greetingSub .7s .2s both var(--ease);
}
@keyframes greetingSub {
from { opacity: 0; transform: translateY(5px); }
to { opacity: 1; transform: translateY(0); }
}
/* Bank card */
.bank-card {
background: linear-gradient(145deg, #0d0d0d, #1a1400);
border: 1px solid var(--accent-bd);
border-radius: 22px;
padding: var(--s-5);
margin-bottom: var(--s-3);
position: relative;
overflow: hidden;
box-shadow: var(--shadow-2);
animation: bankCardIn .7s var(--ease) both;
transition: transform var(--t-med), box-shadow var(--t-med);
}
.bank-card:hover {
transform: translateY(-3px);
box-shadow: 0 20px 48px rgba(0,0,0,.5), 0 0 24px var(--accent-glow);
}
@keyframes bankCardIn {
from { transform: translateY(20px) scale(.98); opacity: 0; }
to { transform: translateY(0) scale(1); opacity: 1; }
}
.bank-card::before {
content: '';
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), var(--accent), transparent);
background-size: 200% 100%;
animation: bankShine 3s ease-in-out infinite;
}
.bank-card::after {
content: '';
position: absolute;
top: 50%;
right: -50px;
width: 200px;
height: 200px;
background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
opacity: .15;
pointer-events: none;
animation: bankGlow 6s ease-in-out infinite alternate;
}
@keyframes bankShine {
0%, 100% { background-position: 0% 0; opacity: .8; }
50% { background-position: 100% 0; opacity: 1; }
}
@keyframes bankGlow {
0% { transform: translate(0, -50%) scale(1); opacity: .1; }
100% { transform: translate(-30px, -40%) scale(1.3); opacity: .25; }
}
.bank-top {
display: flex;
justify-content: space-between;
align-items: flex-start;
margin-bottom: var(--s-3);
position: relative;
z-index: 2;
}
.bank-logo {
display: flex;
align-items: center;
gap: var(--s-2);
}
.bank-logo-icon {
width: 28px; height: 28px;
border-radius: 8px;
background: linear-gradient(135deg, var(--accent), var(--accent-2));
display: flex; align-items: center; justify-content: center;
box-shadow: 0 4px 12px var(--accent-glow);
animation: logoIconPulse2 3s ease-in-out infinite;
}
@keyframes logoIconPulse2 {
0%, 100% { box-shadow: 0 4px 12px var(--accent-glow); }
50% { box-shadow: 0 4px 20px var(--accent-glow), 0 0 0 4px var(--accent-dim); }
}
.bank-logo-icon svg { width: 20px; height: auto; fill: #0a0600; }
.bank-logo-text { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
.bank-badge {
background: var(--accent-dim);
border: 1px solid var(--accent-bd);
border-radius: 20px;
color: var(--accent-2);
font-size: 10px;
font-weight: 700;
padding: 3px 10px;
backdrop-filter: blur(8px);
}
.bank-bal-lbl {
font-size: 9px;
letter-spacing: 2.5px;
text-transform: uppercase;
color: rgba(255,255,255,.3);
margin-bottom: 4px;
position: relative;
z-index: 2;
}
.bank-balance {
font-size: 42px;
font-weight: 900;
color: #fff;
letter-spacing: -2px;
margin-bottom: var(--s-3);
font-variant-numeric: tabular-nums;
position: relative;
z-index: 2;
background: linear-gradient(135deg, #fff, var(--accent-2));
-webkit-background-clip: text;
background-clip: text;
text-shadow: 0 0 40px rgba(255,255,255,.1);
}
.bank-balance .cur {
font-size: 14px;
opacity: .4;
font-weight: 400;
letter-spacing: 0;
margin-left: 4px;
-webkit-text-fill-color: rgba(255,255,255,.4);
}
.bank-stats {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: var(--s-2);
position: relative;
z-index: 2;
}
.bank-stat {
background: rgba(255,255,255,.05);
border: 1px solid rgba(255,255,255,.07);
border-radius: 11px;
padding: var(--s-3) var(--s-2);
transition: all var(--t-med);
cursor: default;
position: relative;
overflow: hidden;
}
.bank-stat::before {
content: '';
position: absolute;
top: 0; left: -100%;
width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent);
transition: left .5s;
}
.bank-stat:hover {
background: rgba(255,255,255,.08);
border-color: var(--accent-bd);
transform: translateY(-2px);
}
.bank-stat:hover::before { left: 100%; }
.bank-stat-icon {
font-size: 16px;
margin-bottom: 4px;
filter: drop-shadow(0 2px 6px var(--accent-glow));
transition: transform var(--t-med);
}
.bank-stat:hover .bank-stat-icon {
transform: scale(1.2) rotate(-8deg);
}
.bank-stat-val {
font-size: 14px;
font-weight: 800;
color: rgba(255,255,255,.95);
font-variant-numeric: tabular-nums;
}
.bank-stat-lbl {
font-size: 9px;
color: rgba(255,255,255,.4);
text-transform: uppercase;
letter-spacing: .8px;
margin-top: 3px;
font-weight: 600;
}
.bank-bar {
margin-top: var(--s-3);
position: relative;
z-index: 2;
}
.bank-bar-lbl {
display: flex;
justify-content: space-between;
font-size: 10px;
color: rgba(255,255,255,.4);
margin-bottom: 6px;
font-weight: 600;
}
.bank-bar-track {
height: 6px;
background: rgba(255,255,255,.08);
border-radius: 6px;
overflow: hidden;
position: relative;
}
.bank-bar-fill {
height: 100%;
background: linear-gradient(90deg, var(--accent), var(--accent-2));
border-radius: 6px;
transition: width 1s var(--ease);
box-shadow: 0 0 12px var(--accent-glow);
position: relative;
overflow: hidden;
}
.bank-bar-fill::after {
content: '';
position: absolute;
top: 0; left: -100%;
width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
animation: barSlide 2.5s ease-in-out infinite;
}
@keyframes barSlide {
to { left: 100%; }
}
/* Summary grid */
.cards-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: var(--s-2);
margin-bottom: var(--s-2);
}
.stat-card {
background: linear-gradient(145deg, var(--bg3), var(--bg2));
border: 1px solid var(--border);
border-radius: var(--r-md);
padding: var(--s-3);
position: relative;
overflow: hidden;
transition: all var(--t-med);
animation: statIn .6s var(--ease) both;
}
.stat-card:nth-child(1) { animation-delay: .1s; }
.stat-card:nth-child(2) { animation-delay: .15s; }
.stat-card:nth-child(3) { animation-delay: .2s; }
.stat-card:nth-child(4) { animation-delay: .25s; }
@keyframes statIn {
from { transform: translateY(15px) scale(.95); opacity: 0; }
to { transform: translateY(0) scale(1); opacity: 1; }
}
.stat-card::before {
content: '';
position: absolute;
top: 0; right: 0;
width: 80px; height: 80px;
background: radial-gradient(circle, var(--accent-glow), transparent 70%);
opacity: 0;
transition: opacity var(--t-med);
pointer-events: none;
}
.stat-card:hover {
border-color: var(--accent-bd);
transform: translateY(-3px);
box-shadow: 0 10px 24px rgba(0,0,0,.35);
}
.stat-card:hover::before {
opacity: .3;
}
.stat-card:hover .stat-icon {
transform: scale(1.15) rotate(-5deg);
}
.stat-icon {
width: 36px; height: 36px;
border-radius: 10px;
display: flex; align-items: center; justify-content: center;
font-size: 17px;
transition: transform var(--t-med);
box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.stat-icon.income {
background: var(--green-dim);
filter: drop-shadow(0 2px 6px rgba(16,185,129,.3));
}
.stat-icon.expense {
background: rgba(239,68,68,.12);
filter: drop-shadow(0 2px 6px rgba(239,68,68,.3));
}
.stat-icon.saved {
background: var(--accent-dim);
filter: drop-shadow(0 2px 6px var(--accent-glow));
}
.stat-icon.balance {
background: rgba(255,255,255,.06);
}
.stat-badge {
font-size: 10px;
font-weight: 800;
padding: 3px 9px;
border-radius: 8px;
background: var(--bg4);
color: var(--text2);
letter-spacing: .3px;
}
.stat-label {
font-size: var(--fs-xs);
color: var(--text3);
margin: var(--s-2) 0 3px;
font-weight: 600;
letter-spacing: .3px;
}
.stat-value {
font-size: 22px;
font-weight: 900;
line-height: 1;
font-variant-numeric: tabular-nums;
letter-spacing: -.5px;
transition: transform var(--t-fast);
}
.stat-card:hover .stat-value {
transform: scale(1.05);
}
.stat-value.inc {
color: var(--green-2);
text-shadow: 0 0 20px rgba(16,185,129,.3);
}
.stat-value.exp {
color: var(--danger);
text-shadow: 0 0 20px rgba(239,68,68,.3);
}
.stat-value.sav {
color: var(--accent-2);
text-shadow: 0 0 20px var(--accent-glow);
}
.stat-value.bal { color: var(--text); }
.stat-bar {
background: var(--bg5);
border-radius: 4px;
height: 4px;
margin-top: var(--s-2);
overflow: hidden;
position: relative;
}
.stat-bar-fill {
height: 100%;
transition: width 1s var(--ease);
position: relative;
border-radius: 4px;
}
.stat-bar-fill::after {
content: '';
position: absolute;
top: 0; left: -100%;
width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
animation: barSlide 2.5s ease-in-out infinite;
}
/* Progress */
.progress-card {
background: var(--bg3);
border: 1px solid var(--border);
border-radius: var(--r-md);
padding: var(--s-4);
margin-bottom: var(--s-2);
}
.progress-head {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: var(--s-3);
}
.progress-title { font-size: 12px; font-weight: 700; color: var(--text2); }
.progress-pct {
font-size: 20px;
font-weight: 800;
color: var(--accent-2);
font-variant-numeric: tabular-nums;
}
.progress-track {
background: var(--bg5);
border-radius: 10px;
height: 7px;
overflow: hidden;
margin-bottom: 6px;
}
.progress-fill {
height: 100%;
border-radius: 10px;
background: var(--accent);
transition: width var(--t-slow) var(--ease), background var(--t-med);
}
.progress-fill.warn { background: var(--warn); }
.progress-fill.danger { background: var(--danger); }
.progress-labels {
display: flex;
justify-content: space-between;
font-size: 10px;
color: var(--text3);
font-variant-numeric: tabular-nums;
}
/* Section */
.section {
background: var(--bg3);
border: 1px solid var(--border);
border-radius: var(--r-md);
padding: var(--s-4);
margin-bottom: var(--s-2);
}
.section-head {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: var(--s-3);
gap: var(--s-2);
}
.section-total {
font-size: var(--fs-sm);
font-weight: 800;
color: var(--accent-2);
font-variant-numeric: tabular-nums;
}
.section-add {
background: linear-gradient(135deg, var(--bg4), var(--bg3));
border: 1px solid var(--border2);
border-radius: 10px;
padding: 6px 14px;
color: var(--text2);
font-size: 12px;
font-weight: 700;
transition: all var(--t-med);
position: relative;
overflow: hidden;
}
.section-add::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(90deg, transparent, var(--accent-dim), transparent);
transition:left .4s;
}
.section-add:hover, .section-add:focus-visible {
border-color: var(--accent);
color: var(--accent-2);
background: linear-gradient(135deg, var(--accent-dim), var(--bg4));
transform: translateY(-1px);
box-shadow: 0 3px 10px var(--accent-glow);
}
.section-add:hover::before{ left:100%; }
.section-add:active { transform: translateY(0) scale(.96); }
/* Item rows */
.items { display: flex; flex-direction: column; gap: 4px; }
.item {
display: flex;
align-items: center;
gap: var(--s-2);
background: var(--bg4);
border-radius: 10px;
padding: 11px 12px;
border: 1px solid transparent;
transition: all var(--t-med);
position: relative;
overflow: hidden;
}
.item::before{
content:'';
position:absolute;
top:0;
right:0;
width:3px;
height:100%;
background:var(--accent);
transform:scaleY(0);
transform-origin:top;
transition:transform var(--t-med);
}
.item:hover {
border-color: var(--accent-bd);
background: var(--bg5);
transform: translateX(-2px);
}
.item:hover::before{ transform:scaleY(1); }
.item.paid { opacity: .4; }
.item.paid .item-name { text-decoration: line-through; }
.item-emoji {
width: 32px; height: 32px;
border-radius: 8px;
background: linear-gradient(135deg, var(--bg5), var(--bg4));
display: flex; align-items: center; justify-content: center;
font-size: 15px;
flex-shrink: 0;
transition: transform var(--t-med);
}
.item:hover .item-emoji{
transform: scale(1.1) rotate(-5deg);
}
.item-name {
flex: 1;
font-size: var(--fs-sm);
color: var(--text);
min-width: 0;
overflow: hidden;
text-overflow: ellipsis;
}
.item-amount {
font-size: var(--fs-sm);
font-weight: 700;
white-space: nowrap;
font-variant-numeric: tabular-nums;
}
.item-amount.inc { color: var(--green-2); }
.item-amount.exp { color: var(--danger); }
.item-del {
color: var(--text3);
font-size: 12px;
padding: 4px;
transition: color var(--t-fast);
}
.item-del:hover, .item-del:focus-visible { color: var(--danger); }
.empty {
text-align: center;
padding: var(--s-6);
color: var(--text3);
font-size: 12px;
}
.empty-icon {
font-size: 28px;
opacity: .25;
display: block;
margin-bottom: var(--s-2);
}
/* Forms */
.form {
background: var(--bg4);
border-radius: 10px;
padding: var(--s-3);
border: 1px solid var(--border);
margin-top: var(--s-2);
display: none;
}
.form.open {
display: block;
animation: slideDown var(--t-med) var(--ease);
}
@keyframes slideDown {
from { opacity: 0; transform: translateY(-8px); }
to { opacity: 1; transform: translateY(0); }
}
.chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: var(--s-2); }
.chip {
background: var(--bg5);
border: 1px solid var(--border);
border-radius: 16px;
padding: 4px 10px;
font-size: var(--fs-xs);
color: var(--text3);
transition: all var(--t-fast);
}
.chip:hover, .chip.active {
background: var(--accent-dim);
border-color: var(--accent);
color: var(--accent-2);
}
.form-row { display: flex; gap: 6px; flex-wrap: wrap; }
.input, .select {
flex: 1;
min-width: 80px;
background: var(--bg5);
border: 1px solid var(--border);
border-radius: 8px;
padding: 9px 11px;
color: var(--text);
font-size: 13px;
transition: border-color var(--t-fast);
-webkit-appearance: none;
}
.input:focus, .select:focus { border-color: var(--accent); }
.input::placeholder { color: var(--text3); }
.input.error {
border-color: var(--danger);
animation: shake .4s;
}
@keyframes shake {
0%, 100% { transform: translateX(0); }
25% { transform: translateX(-4px); }
75% { transform: translateX(4px); }
}
.btn-primary {
background: var(--accent);
color: #0a0600;
border-radius: 8px;
padding: 9px 18px;
font-size: 13px;
font-weight: 700;
transition: all var(--t-fast);
white-space: nowrap;
}
.btn-primary:hover { opacity: .88; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.amt-shortcuts {
display: flex;
gap: 4px;
flex-wrap: wrap;
margin-top: var(--s-2);
}
