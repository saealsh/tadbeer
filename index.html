<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تدبير — المنظومة الذكية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0c14;
            --card: #161b29;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding-bottom: 100px;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; }

        /* الهيدر وستريك الحضور */
        .header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: var(--card); border-bottom: 1px solid var(--border);
        }

        .streak-btn {
            background: linear-gradient(45deg, #f59e0b, #ef4444);
            padding: 8px 16px; border-radius: 20px; font-weight: 900;
            display: flex; align-items: center; gap: 8px; cursor: pointer; border: none; color: white;
        }

        /* البطاقة المالية */
        .main-card {
            background: linear-gradient(135deg, #1e3a8a, #0f172a);
            border-radius: 25px; padding: 25px; margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .balance { font-size: 32px; font-weight: 900; margin: 10px 0; }

        /* شبكة الخدمات والقوائم */
        .services-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px;
        }

        .service-card {
            background: var(--card); padding: 20px; border-radius: 20px;
            text-align: center; border: 1px solid var(--border); cursor: pointer;
        }

        .service-card:active { transform: scale(0.95); background: var(--primary); }

        /* القائمة السفلية - تأكدنا من أنها فوق كل العناصر */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #111827; height: 80px; display: flex;
            justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border); z-index: 9999;
        }

        .nav-link {
            background: none; border: none; color: var(--text-dim);
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            cursor: pointer; width: 20%; font-family: inherit;
        }

        .nav-link.active { color: var(--primary); }

        .add-trigger {
            width: 60px; height: 60px; background: var(--primary);
            border-radius: 20px; display: flex; align-items: center;
            justify-content: center; color: white; font-size: 30px;
            margin-top: -40px; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
            border: none; cursor: pointer;
        }

        /* المودال (النافذة المنبثقة) */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: flex-end;
            z-index: 10000;
        }

        .modal-content {
            background: var(--card); width: 100%; max-width: 500px;
            padding: 30px; border-radius: 30px 30px 0 0;
            transform: translateY(100%); transition: 0.3s;
        }

        .modal-overlay.open { display: flex; }
        .modal-overlay.open .modal-content { transform: translateY(0); }

        input, select {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px;
        }

        .save-btn {
            width: 100%; background: var(--primary); color: white;
            border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-weight: 900; font-size: 20px;">تدبير</div>
        <button class="streak-btn" id="streakTrigger">
            <span>🔥</span> <span id="streakValue">14 يوم</span>
        </button>
    </header>

    <main class="container">
        <div class="main-card">
            <div style="font-size: 12px; opacity: 0.8;">المتبقي الكلي</div>
            <div class="balance" id="balanceVal">12,450.00 SAR</div>
            <div style="font-size: 11px;">نسبة الإنفاق: 32%</div>
            <div style="height: 4px; background: rgba(255,255,255,0.1); margin-top: 10px; border-radius: 5px; overflow: hidden;">
                <div style="width: 32%; height: 100%; background: var(--success);"></div>
            </div>
        </div>

        <div class="services-grid">
            <div class="service-card" onclick="openForm('income')">
                <div style="font-size: 24px;">💰</div>
                <div style="font-size: 12px; margin-top: 5px;">إضافة دخل</div>
            </div>
            <div class="service-card" onclick="openForm('expense')">
                <div style="font-size: 24px;">💸</div>
                <div style="font-size: 12px; margin-top: 5px;">إضافة مصروف</div>
            </div>
            <div class="service-card" onclick="openForm('saving')">
                <div style="font-size: 24px;">🎯</div>
                <div style="font-size: 12px; margin-top: 5px;">الأهداف</div>
            </div>
            <div class="service-card" onclick="alert('قريباً: التقارير البيانية')">
                <div style="font-size: 24px;">📊</div>
                <div style="font-size: 12px; margin-top: 5px;">التحليل</div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h3 id="modalTitle">إضافة عملية</h3>
            <input type="text" id="itemName" placeholder="اسم البند (مثلاً: راتب، غذاء)">
            <input type="number" id="itemAmount" placeholder="المبلغ">
            <button class="save-btn" id="saveAction">حفظ البيانات</button>
            <button onclick="closeForm()" style="width: 100%; background: none; border: none; color: var(--text-dim); margin-top: 10px; cursor: pointer;">إلغاء</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-link active" onclick="location.reload()">
            <span>🏠</span><span>الرئيسية</span>
        </button>
        <button class="nav-link" onclick="openForm('expense')">
            <span>📊</span><span>التقارير</span>
        </button>
        <button class="add-trigger" id="mainAddBtn"><span>+</span></button>
        <button class="nav-link" onclick="openForm('saving')">
            <span>🎯</span><span>الأهداف</span>
        </button>
        <button class="nav-link" onclick="alert('الإعدادات')">
            <span>⚙️</span><span>الإعدادات</span>
        </button>
    </nav>

    <script>
        // نظام الإدارة المالي
        const state = {
            balance: 12450,
            streak: 14,
            todayLogged: false
        };

        // حل مشكلة الأزرار: ربط الأحداث بمجرد تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            
            // زر الإضافة المركزي
            document.getElementById('mainAddBtn').addEventListener('click', () => openForm('expense'));

            // زر الستريك
            document.getElementById('streakTrigger').addEventListener('click', () => {
                if(!state.todayLogged) {
                    state.streak++;
                    state.todayLogged = true;
                    document.getElementById('streakValue').innerText = state.streak + " يوم";
                    alert("كفو! تم تسجيل حضورك اليوم 🔥");
                } else {
                    alert("تم تسجيل حضورك مسبقاً لهذا اليوم.");
                }
            });

            // زر الحفظ داخل المودال
            document.getElementById('saveAction').addEventListener('click', processEntry);
        });

        function openForm(type) {
            const overlay = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            
            title.innerText = type === 'income' ? 'إضافة دخل جديد' : 
                             type === 'saving' ? 'إضافة هدف توفير' : 'إضافة مصروف جديد';
            
            overlay.classList.add('open');
        }

        function closeForm() {
            document.getElementById('modalOverlay').classList.remove('open');
        }

        function processEntry() {
            const amt = parseFloat(document.getElementById('itemAmount').value);
            const name = document.getElementById('itemName').value;

            if(amt && name) {
                // تحديث الرصيد (تبسيط)
                state.balance -= amt;
                document.getElementById('balanceVal').innerText = state.balance.toLocaleString() + " SAR";
                
                alert("تم الحفظ بنجاح ✅");
                closeForm();
                
                // تصفير الحقول
                document.getElementById('itemAmount').value = '';
                document.getElementById('itemName').value = '';
            } else {
                alert("يرجى إدخال البيانات كاملة");
            }
        }
    </script>
</body>
</html>
